---
name: Build & Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.13"
  HATCH_VERSION: "1.16.5"
  XP_CHANNEL: stable
  XP_VERSION: v2.2.0
  XPKG_NAME: function-homerun2-pitcher
  XPKG: ghcr.io/${{ github.repository }}

jobs:
  lint:
    name: ruff (hatch fmt)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Hatch
        run: pipx install hatch==${{ env.HATCH_VERSION }}

      - name: Lint
        run: hatch fmt --check

  unit-test:
    name: pytest (hatch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Hatch
        run: pipx install hatch==${{ env.HATCH_VERSION }}

      - name: Run pytest with coverage
        run: hatch run test-cov

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  build-xpkg:
    name: Build xpkg (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [unit-test]
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime image (linux/${{ matrix.arch }}) → tarball
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: image
          outputs: type=docker,dest=runtime-${{ matrix.arch }}.tar

      - name: Setup Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh \
            | XP_CHANNEL=${{ env.XP_CHANNEL }} XP_VERSION=${{ env.XP_VERSION }} sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Build xpkg
        run: |
          crossplane xpkg build \
            --package-root=package \
            --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar \
            --package-file=${{ env.XPKG_NAME }}-${{ matrix.arch }}.xpkg

      - name: Upload single-arch xpkg
        uses: actions/upload-artifact@v7
        with:
          name: xpkg-${{ matrix.arch }}
          path: "*.xpkg"
          if-no-files-found: error
          retention-days: 7

  push-pr-xpkg:
    name: Push pr-tagged xpkg
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [build-xpkg]
    steps:
      - uses: actions/checkout@v6

      - name: Download single-arch xpkg artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: xpkg-*
          path: .
          merge-multiple: true

      - name: Setup Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh \
            | XP_CHANNEL=${{ env.XP_CHANNEL }} XP_VERSION=${{ env.XP_VERSION }} sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push pr-${{ github.event.number }}-${{ github.event.pull_request.head.sha }}
        run: |
          crossplane --verbose xpkg push \
            --package-files "$(echo *.xpkg | tr ' ' ,)" \
            ${{ env.XPKG }}:pr-${{ github.event.number }}-${{ github.event.pull_request.head.sha }}

      - name: Push pr-${{ github.event.number }} (rolling)
        run: |
          crossplane --verbose xpkg push \
            --package-files "$(echo *.xpkg | tr ' ' ,)" \
            ${{ env.XPKG }}:pr-${{ github.event.number }}

      - name: Summary
        run: |
          {
            echo "## Preview xpkg"
            echo ""
            echo "| Tag | Reference |"
            echo "|-----|-----------|"
            echo "| pr-${{ github.event.number }} | \`${{ env.XPKG }}:pr-${{ github.event.number }}\` |"
            echo "| pr-${{ github.event.number }}-${{ github.event.pull_request.head.sha }} | \`${{ env.XPKG }}:pr-${{ github.event.number }}-${{ github.event.pull_request.head.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
