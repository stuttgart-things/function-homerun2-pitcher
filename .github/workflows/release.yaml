---
name: Release
on:
  workflow_run:
    workflows: ["Build & Test", "Build & Scan Runtime Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run-only:
        description: "semantic-release dry run only"
        required: false
        default: "false"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.13"
  HATCH_VERSION: "1.16.5"
  XP_CHANNEL: stable
  XP_VERSION: v2.2.0
  XPKG_NAME: function-homerun2-pitcher
  XPKG: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: semantic-release → multi-arch xpkg push
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version before release
        id: before
        run: |
          git fetch --tags
          BEFORE=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "none")
          echo "version=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "Latest tag before release: $BEFORE"

      - name: Semantic release
        uses: dagger/dagger-for-github@v8.4.1
        with:
          module: github.com/stuttgart-things/dagger/release@v0.82.1
          call: >-
            semantic
            --src .
            --token env:GITHUB_TOKEN
            --dry-run-only=${{ github.event.inputs.dry-run-only || 'false' }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to released commit
        run: |
          git fetch --tags
          git pull --ff-only || true

      - name: Get new version
        id: after
        run: |
          AFTER=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "none")
          echo "version=$AFTER" >> "$GITHUB_OUTPUT"
          if [ "$AFTER" != "${{ steps.before.outputs.version }}" ] && [ "$AFTER" != "none" ]; then
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            echo "New release: $AFTER"
          else
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            echo "No new release."
          fi

      - name: Setup QEMU
        if: steps.after.outputs.new_release == 'true'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Setup Docker Buildx
        if: steps.after.outputs.new_release == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Setup Crossplane CLI
        if: steps.after.outputs.new_release == 'true'
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh \
            | XP_CHANNEL=${{ env.XP_CHANNEL }} XP_VERSION=${{ env.XP_VERSION }} sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Build runtime image (linux/amd64) → tarball
        if: steps.after.outputs.new_release == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          cache-from: type=gha
          target: image
          outputs: type=docker,dest=runtime-amd64.tar

      - name: Build runtime image (linux/arm64) → tarball
        if: steps.after.outputs.new_release == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          cache-from: type=gha
          target: image
          outputs: type=docker,dest=runtime-arm64.tar

      - name: Build amd64 xpkg
        if: steps.after.outputs.new_release == 'true'
        run: |
          crossplane xpkg build \
            --package-root=package \
            --embed-runtime-image-tarball=runtime-amd64.tar \
            --package-file=${{ env.XPKG_NAME }}-amd64.xpkg

      - name: Build arm64 xpkg
        if: steps.after.outputs.new_release == 'true'
        run: |
          crossplane xpkg build \
            --package-root=package \
            --embed-runtime-image-tarball=runtime-arm64.tar \
            --package-file=${{ env.XPKG_NAME }}-arm64.xpkg

      - name: Login to GHCR
        if: steps.after.outputs.new_release == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push multi-arch xpkg as ${{ steps.after.outputs.version }}
        if: steps.after.outputs.new_release == 'true'
        run: |
          crossplane --verbose xpkg push \
            --package-files "$(echo *.xpkg | tr ' ' ,)" \
            ${{ env.XPKG }}:${{ steps.after.outputs.version }}

      - name: Update release notes with artifact
        if: steps.after.outputs.new_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.after.outputs.version }}"
          EXISTING_BODY=$(gh release view "$VERSION" --json body --jq '.body' || echo "")
          ARTIFACTS="### Artifacts\n\n| Artifact | Reference |\n|----------|-----------|\n| **xpkg** | \`${{ env.XPKG }}:${VERSION}\` |"
          gh release edit "$VERSION" --notes "$(printf '%s\n\n%b' "$EXISTING_BODY" "$ARTIFACTS")"

      - name: Release summary
        if: steps.after.outputs.new_release == 'true'
        run: |
          {
            echo "## Released ${{ steps.after.outputs.version }}"
            echo ""
            echo "| | |"
            echo "|--|--|"
            echo "| **Version** | \`${{ steps.after.outputs.version }}\` |"
            echo "| **xpkg** | \`${{ env.XPKG }}:${{ steps.after.outputs.version }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: No-release summary
        if: steps.after.outputs.new_release != 'true'
        run: |
          {
            echo "## No release"
            echo ""
            echo "semantic-release did not produce a new version."
          } >> "$GITHUB_STEP_SUMMARY"
