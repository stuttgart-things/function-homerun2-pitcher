---
version: "3"

vars:
  IMAGE_REPO: ghcr.io/stuttgart-things/function-homerun2-pitcher
  XPKG_NAME: function-homerun2-pitcher
  VERSION:
    sh: hatch version 2>/dev/null || echo "0.0.0"
  KIND_CLUSTER: function-homerun2-pitcher-e2e
  KIND_REGISTRY_NAME: kind-registry
  KIND_REGISTRY_PORT: "5001"
  E2E_XPKG_TAG: "localhost:{{.KIND_REGISTRY_PORT}}/function-homerun2-pitcher:e2e"
  E2E_NS_XP: crossplane-system
  E2E_NS_APP: homerun
  E2E_NS_DEMO: demo

tasks:
  default:
    cmds:
      - task --list-all

  install:
    desc: Install hatch deps for local development
    cmds:
      - hatch env create
      - hatch run python -V

  dev:
    desc: Run the gRPC server locally on :9443 (insecure, debug)
    cmds:
      - hatch run development

  fmt:
    desc: Run ruff fmt + lint
    cmds:
      - hatch fmt

  test:
    desc: Run pytest
    cmds:
      - hatch run test

  test-cov:
    desc: Run pytest with coverage
    cmds:
      - hatch run test-cov

  build-image:
    desc: Build the runtime OCI image for a single arch (defaults to host)
    vars:
      ARCH: '{{.ARCH | default "amd64"}}'
    cmds:
      - >
        docker buildx build
        --platform linux/{{.ARCH}}
        --tag {{.IMAGE_REPO}}:runtime-{{.ARCH}}
        --output type=docker
        .

  build-image-amd64:
    desc: Build the runtime image for linux/amd64
    cmds:
      - task: build-image
        vars: {ARCH: amd64}

  build-image-arm64:
    desc: Build the runtime image for linux/arm64
    cmds:
      - task: build-image
        vars: {ARCH: arm64}

  build-xpkg-amd64:
    desc: Build the xpkg embedding the linux/amd64 runtime image
    deps: [build-image-amd64]
    cmds:
      - mkdir -p dist
      - >
        crossplane xpkg build
        --package-root=package
        --embed-runtime-image={{.IMAGE_REPO}}:runtime-amd64
        --package-file=dist/{{.XPKG_NAME}}-amd64.xpkg

  build-xpkg-arm64:
    desc: Build the xpkg embedding the linux/arm64 runtime image
    deps: [build-image-arm64]
    cmds:
      - mkdir -p dist
      - >
        crossplane xpkg build
        --package-root=package
        --embed-runtime-image={{.IMAGE_REPO}}:runtime-arm64
        --package-file=dist/{{.XPKG_NAME}}-arm64.xpkg

  build:
    desc: Build both xpkgs (amd64 + arm64)
    cmds:
      - task: build-xpkg-amd64
      - task: build-xpkg-arm64

  smoke:
    desc: docker run the runtime image and verify the gRPC port answers
    deps: [build-image]
    cmds:
      - >
        docker run --rm -d --name pitcher-smoke
        -e PITCH_AUTH_TOKEN=smoke
        -p 9443:9443
        {{.IMAGE_REPO}}:runtime-amd64
        --insecure
      - sleep 2
      - bash -c 'nc -z localhost 9443 && echo "gRPC port open" && docker stop pitcher-smoke'

  push:
    desc: Push both xpkgs to ghcr.io for {{.VERSION}}
    cmds:
      - >
        crossplane xpkg push
        --package-files=dist/{{.XPKG_NAME}}-amd64.xpkg,dist/{{.XPKG_NAME}}-arm64.xpkg
        {{.IMAGE_REPO}}:v{{.VERSION}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ .venv-default/ .pytest_cache/ .ruff_cache/ htmlcov/
      - find . -type d -name __pycache__ -exec rm -rf {} +

  lint:precommit:
    desc: Run pre-commit hooks against all files
    cmds:
      - pre-commit run --all-files --show-diff-on-failure

  lint:commit:
    desc: Lint commit messages on the current branch against main
    cmds:
      - npx --yes commitlint --from origin/main --to HEAD --verbose

  e2e:up:
    desc: Create kind cluster + local registry, install Crossplane v2 with --enable-operations, push local xpkg, deploy Redis + omni-pitcher + function manifests
    cmds:
      - bash tests/e2e/scripts/up.sh
    env:
      KIND_CLUSTER: "{{.KIND_CLUSTER}}"
      KIND_REGISTRY_NAME: "{{.KIND_REGISTRY_NAME}}"
      KIND_REGISTRY_PORT: "{{.KIND_REGISTRY_PORT}}"
      E2E_XPKG_TAG: "{{.E2E_XPKG_TAG}}"
      E2E_NS_XP: "{{.E2E_NS_XP}}"
      E2E_NS_APP: "{{.E2E_NS_APP}}"
      E2E_NS_DEMO: "{{.E2E_NS_DEMO}}"

  e2e:test:
    desc: Run the pytest e2e assertions against the running kind cluster
    cmds:
      - hatch run test-e2e
    env:
      E2E_NS_APP: "{{.E2E_NS_APP}}"
      E2E_NS_DEMO: "{{.E2E_NS_DEMO}}"

  e2e:down:
    desc: Tear down the kind cluster and the local registry container
    cmds:
      - kind delete cluster --name {{.KIND_CLUSTER}} || true
      - docker rm -f {{.KIND_REGISTRY_NAME}} || true

  e2e:
    desc: Full e2e — bring up, run pytest, tear down (trap ensures cleanup on failure)
    cmds:
      # Task runs commands via mvdan/sh, which doesn't accept named signals
      # like INT/TERM in `trap`. EXIT alone covers normal exit + `set -e`
      # failures, which is all we need for CI cleanup.
      - |
        set -eu
        trap 'task e2e:down' EXIT
        task e2e:up
        task e2e:test
