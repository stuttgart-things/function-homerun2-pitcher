---
version: "3"

vars:
  IMAGE_REPO: ghcr.io/stuttgart-things/function-homerun2-pitcher
  XPKG_NAME: function-homerun2-pitcher
  VERSION:
    sh: hatch version 2>/dev/null || echo "0.0.0"

tasks:
  default:
    cmds:
      - task --list-all

  install:
    desc: Install hatch deps for local development
    cmds:
      - hatch env create
      - hatch run python -V

  dev:
    desc: Run the gRPC server locally on :9443 (insecure, debug)
    cmds:
      - hatch run development

  fmt:
    desc: Run ruff fmt + lint
    cmds:
      - hatch fmt

  test:
    desc: Run pytest
    cmds:
      - hatch run test

  test-cov:
    desc: Run pytest with coverage
    cmds:
      - hatch run test-cov

  build-image:
    desc: Build the runtime OCI image for a single arch (defaults to host)
    vars:
      ARCH: '{{.ARCH | default "amd64"}}'
    cmds:
      - >
        docker buildx build
        --platform linux/{{.ARCH}}
        --tag {{.IMAGE_REPO}}:runtime-{{.ARCH}}
        --output type=docker
        .

  build-image-amd64:
    desc: Build the runtime image for linux/amd64
    cmds:
      - task: build-image
        vars: {ARCH: amd64}

  build-image-arm64:
    desc: Build the runtime image for linux/arm64
    cmds:
      - task: build-image
        vars: {ARCH: arm64}

  build-xpkg-amd64:
    desc: Build the xpkg embedding the linux/amd64 runtime image
    deps: [build-image-amd64]
    cmds:
      - mkdir -p dist
      - >
        crossplane xpkg build
        --package-root=package
        --embed-runtime-image={{.IMAGE_REPO}}:runtime-amd64
        --package-file=dist/{{.XPKG_NAME}}-amd64.xpkg

  build-xpkg-arm64:
    desc: Build the xpkg embedding the linux/arm64 runtime image
    deps: [build-image-arm64]
    cmds:
      - mkdir -p dist
      - >
        crossplane xpkg build
        --package-root=package
        --embed-runtime-image={{.IMAGE_REPO}}:runtime-arm64
        --package-file=dist/{{.XPKG_NAME}}-arm64.xpkg

  build:
    desc: Build both xpkgs (amd64 + arm64)
    cmds:
      - task: build-xpkg-amd64
      - task: build-xpkg-arm64

  smoke:
    desc: docker run the runtime image and verify the gRPC port answers
    deps: [build-image]
    cmds:
      - >
        docker run --rm -d --name pitcher-smoke
        -e PITCH_AUTH_TOKEN=smoke
        -p 9443:9443
        {{.IMAGE_REPO}}:runtime-amd64
        --insecure
      - sleep 2
      - bash -c 'nc -z localhost 9443 && echo "gRPC port open" && docker stop pitcher-smoke'

  push:
    desc: Push both xpkgs to ghcr.io for {{.VERSION}}
    cmds:
      - >
        crossplane xpkg push
        --package-files=dist/{{.XPKG_NAME}}-amd64.xpkg,dist/{{.XPKG_NAME}}-arm64.xpkg
        {{.IMAGE_REPO}}:v{{.VERSION}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ .venv-default/ .pytest_cache/ .ruff_cache/ htmlcov/
      - find . -type d -name __pycache__ -exec rm -rf {} +

  lint:precommit:
    desc: Run pre-commit hooks against all files
    cmds:
      - pre-commit run --all-files --show-diff-on-failure

  lint:commit:
    desc: Lint commit messages on the current branch against main
    cmds:
      - npx --yes commitlint --from origin/main --to HEAD --verbose
