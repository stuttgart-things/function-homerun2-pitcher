---
apiVersion: meta.pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-homerun2-pitcher
  annotations:
    meta.crossplane.io/maintainer: stuttgart-things <info@stuttgart-things.io>
    meta.crossplane.io/source: github.com/stuttgart-things/function-homerun2-pitcher
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Crossplane v2 Operation function that pitches watched-resource events
      to the homerun2-omni-pitcher /pitch endpoint.
    meta.crossplane.io/readme: |
      Use this function in a WatchOperation pipeline step to forward
      every change to a watched resource as a JSON pitch over HTTPS.
spec:
  capabilities:
    - operation
