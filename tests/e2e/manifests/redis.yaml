---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        # omni-pitcher uses JSON.SET (RedisJSON module), which is only
        # available in Redis Stack — vanilla redis:7-alpine returns
        # "ERR unknown command 'JSON.SET'".
        - name: redis
          image: redis/redis-stack-server:7.4.0-v5
          env:
            - name: REDIS_ARGS
              value: "--save '' --appendonly no"
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 1
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector: { app: redis }
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
