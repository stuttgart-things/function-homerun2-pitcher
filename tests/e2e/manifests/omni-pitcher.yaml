---
# Placeholder omni-pitcher deployment. The image tag here MUST track whatever
# stuttgart-things/homerun2-omni-pitcher publishes. Override with
# OMNI_PITCHER_IMAGE in the env if you need a pinned digest for a given test.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homerun2-omni-pitcher
spec:
  replicas: 1
  selector:
    matchLabels: { app: homerun2-omni-pitcher }
  template:
    metadata:
      labels: { app: homerun2-omni-pitcher }
    spec:
      containers:
        - name: pitcher
          image: ghcr.io/stuttgart-things/homerun2-omni-pitcher:v1.11.1
          imagePullPolicy: IfNotPresent
          env:
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homerun2-omni-pitcher-auth
                  key: token
            - name: REDIS_ADDR
              value: redis.homerun.svc
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_STREAM
              value: configmaps
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: homerun2-omni-pitcher
spec:
  selector: { app: homerun2-omni-pitcher }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
